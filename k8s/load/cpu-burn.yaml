# Sustained CPU usage (throttled by limits) for dashboards / kubectl top.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-burn
  namespace: loadtest
  labels:
    app: cpu-burn
    team: microkube
    env: loadtest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-burn
  template:
    metadata:
      labels:
        app: cpu-burn
        team: microkube
        env: loadtest
    spec:
      containers:
        - name: burn
          image: busybox:1.36
          command:
            - sh
            - -c
            - "while :; do :; done"
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
