# Short CPU bursts on a schedule (busy-loop; no third-party stress images).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cpu-spike
  namespace: loadtest
  labels:
    app: cpu-spike
    team: microkube
    env: loadtest
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      template:
        metadata:
          labels:
            app: cpu-spike
            team: microkube
            env: loadtest
        spec:
          restartPolicy: Never
          containers:
            - name: spike
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - |
                  echo "cpu-spike start $(date -Iseconds)"
                  END=$(( $(date +%s) + 45 ))
                  while [ "$(date +%s)" -lt "$END" ]; do :; done
                  echo "cpu-spike end $(date -Iseconds)"
              resources:
                requests:
                  cpu: 200m
                  memory: 32Mi
                limits:
                  cpu: "1"
                  memory: 64Mi
